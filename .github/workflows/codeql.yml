# CodeQL — repo-local advanced setup (CI-001b).
#
# Replaces the org-default code-scanning setup with a path-filtered Swift
# workflow so docs-only PRs (.claude/ mirror updates, README tweaks, fleet
# ops notes) no longer trip the "no source to analyze" autobuilder failure
# that org-default CodeQL emits in ~3s on diffs with zero Swift changes.
#
# NOTE: For this workflow to take effect, "Default setup" must be DISABLED
# in this repo's Settings → Code security → Code scanning. Otherwise the
# default setup keeps running in parallel and continues to fail docs-only
# PRs even when this workflow passes.

name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - '**.md'
      - 'docs/**'
      - 'fastlane/README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.claude/**'
      - '**.md'
      - 'docs/**'
      - 'fastlane/README.md'
  schedule:
    # Weekly full scan on Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-14
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: autobuild

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:swift'
