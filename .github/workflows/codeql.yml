# CodeQL — repo-local advanced setup (CI-001b).
#
# Replaces the org-default code-scanning setup with a path-filtered Swift
# workflow so docs-only PRs (.claude/ mirror updates, README tweaks, fleet
# ops notes, workflow tweaks) no longer trip the "no source to analyze"
# autobuilder failure that org-default CodeQL emits in ~3s on diffs with
# zero Swift changes.
#
# Uses an ALLOWLIST `paths:` filter (not paths-ignore) so the workflow only
# fires when actual Swift source or its build manifests change. Anything
# else — docs, config, .claude/, .github/, fastlane README — skips the
# check entirely and the PR check stays green.
#
# build-mode: autobuild works for both .xcodeproj/.xcworkspace projects
# and SwiftPM packages.
#
# REQUIRED ADMIN STEP for this workflow to take effect: Disable "Default
# setup" in this repo's Settings → Code security → Code scanning.
# Otherwise the default setup keeps running in parallel and continues to
# fail docs-only PRs even when this workflow skips them cleanly.

name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - '**.swift'
      - '**/*.xcodeproj/**'
      - '**/*.xcworkspace/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Podfile'
      - 'Podfile.lock'
  pull_request:
    branches: [main]
    paths:
      - '**.swift'
      - '**/*.xcodeproj/**'
      - '**/*.xcworkspace/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'Podfile'
      - 'Podfile.lock'
  schedule:
    # Weekly full scan on Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'

# BUG-FIND-2026-05-18: cancel duplicate scans on rapid pushes (CI-COST hardening).
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (swift)
    # BUG-FIND-2026-05-18: was macos-14 (Xcode 16 default). Match the
    # production runner used by consuming apps (macos-15 + Xcode 26.x).
    runs-on: macos-15
    # BUG-FIND-2026-05-18: bound runaway runner time (macOS minutes are 10× cost).
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          # CI-COST-URGENT-IOS-001 (2026-05-16): autobuild was failing on
          # every PR for this SwiftPM package because the package targets
          # iOS-only APIs (JMVGAuth uses Keychain Services + iOS-only
          # accessibility constants) and the autobuilder defaults to
          # `swift build` against the host (macOS) SDK. Switched to
          # manual + xcodebuild against the iOS Simulator SDK below.
          build-mode: manual

      - name: Resolve SPM deps
        run: swift package resolve

      - name: Build for CodeQL (iOS Simulator)
        run: |
          set -euo pipefail
          xcodebuild \
            -scheme JMVGAuth \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -configuration Debug \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:swift'
